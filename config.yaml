#hour of day (24h) when the scheduled briefing runs
schedule_hour: 7

#gmail account used for both reading and sending
gmail:
  email: "minal.shalam@gmail.com"
  imap_server: "imap.gmail.com"

#single gmail label to pull all newsletters from
input:
  label: "Donna/Inputs"
  #how far back to look for emails, in hours
  since_hours: 24

#list of addresses that receive the daily briefing
recipients:
  - "minal.shalam@gmail.com"

#claude model and output size settings
llm:
  model: "claude-sonnet-4-6"
  #max tokens for the synthesis response — increase to 6000 if sections truncate
  max_tokens: 4000
